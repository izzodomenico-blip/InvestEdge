name: Daily Alert

# Esegue ogni mattina l'analisi su dati reali e invia il riepilogo "Cosa fare oggi"
# su Telegram, senza bisogno che il PC dell'utente sia acceso.
#
# Orario: GitHub usa UTC. 06:30 UTC = circa 08:30 in Italia (ora legale) / 07:30 (ora solare).
# Modifica la riga 'cron' per cambiare orario. Puoi anche lanciarlo a mano da
# Actions -> Daily Alert -> Run workflow.

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ENABLE_ALERTS: "true"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ENABLE_REAL_DATA: ${{ secrets.ENABLE_REAL_DATA || 'true' }}
      ENABLE_REAL_NEWS: ${{ secrets.ENABLE_REAL_NEWS || 'true' }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run daily alert
        run: python scripts/cloud_daily.py
